    <div class="container seksion-informacion" style="margin-top: 40px;">
        <h1>Kontakt</h1>
        <div id="contact-feedback"></div>
        <form action="mailto:milotgjimnazi@yahoo.com" method="get" enctype="text/plain" id="contact-form">
            <div class="form-group">
                <label for="name">Emri:</label>
                <input type="text" class="form-control" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" class="form-control" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="message">Mesazhi:</label>
                <textarea class="form-control" id="message" name="message" rows="5" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Dërgo</button>
        </form>
        <a href="index.html" class="btn btn-danger" style="margin-top: 20px; display: inline-block;">Kthehu në faqen kryesore</a>
    </div>
